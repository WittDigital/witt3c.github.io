name: 自動更新全台天氣資料

on:
  schedule:
    - cron: '0 */3 * * *'  # 每 3 小時執行一次 (國際標準時間)
  workflow_dispatch:       # 允許你手動點擊按鈕立即更新

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 給予機器人寫入檔案的權限

    steps:
      - name: 檢出代碼
        uses: actions/checkout@v4

      - name: 向氣象署索取資料
        run: |
          # 這裡使用 curl 直接抓取全台 36 小時天氣預報
          curl -X GET "https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-C0032-001?Authorization=${{ secrets.CWA_API_KEY }}" -H "accept: application/json" > weather.json

      - name: 檢查並更新檔案
        run: |
          git config --global user.name "Witt-Weather-Bot"
          git config --global user.email "action@github.com"
          git add weather.json
          # 如果資料沒變就不動作，有變才 commit
          git commit -m "🤖 自動更新天氣數據: $(date)" || exit 0
          git push